spring:
  main:
    web-application-type: servlet   # Explicit: prevents WebFlux co-existence warning
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:artezan}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    # Dialect is auto-detected by Hibernate 6+ from the JDBC driver
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    enabled: true
    baseline-version: 0
    baseline-description: "db_init"
    # Flyway inherits spring.datasource credentials automatically
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - read:user
              - user:email
  output:
    ansi:
      enabled: always

# ── JWT / Security ────────────────────────────────────────────────────────────
artezan:
  security:
    jwt:
      secret: ${JWT_SECRET}
    email:
      salt: ${EMAIL_SECRET}

  admin:
    email: oneblockhq@gmail.com
    password: ${ADMIN_PASSWORD}
  customer:
    email: glory@gmail.com
    password: ${CUSTOMER_PASSWORD}
  provider:
    email: chiamaka@gmail.com
    password: ${PROVIDER_PASSWORD}



# ── Token expiry (hours) ──────────────────────────────────────────────────────
access_expiration: ${ACCESS_EXPIRATION:3}
refresh_expiration: ${REFRESH_EXPIRATION:168}

# ── Application meta ──────────────────────────────────────────────────────────
app:
  name: ${APP_NAME:Artezan}
  email: ${APP_EMAIL:info@artezans.com}
  oauth2:
    authorized-redirect-uris:
      - ${OAUTH2_AUTHORIZED_REDIRECT_URI}
      - ${OAUTH2_REDIRECT_URI_LOCAL}
      - ${OAUTH2_REDIRECT_URI_PROD}



charges: ${CHARGES:0.15}

frontend:
  url: ${FRONTEND_URL}

# ── Brevo (email + SMS) ───────────────────────────────────────────────────────
sendinblue:
  mail:
    api_key: ${BREVO_API_KEY}
    url: ${MAIL_URL:https://api.brevo.com/v3/smtp/email}
  sms:
    url: ${SMS_URL:https://api.brevo.com/v3/transactionalSMS/sms}

# ── Cloudinary ────────────────────────────────────────────────────────────────
cloudinary:
  cloud:
    name: ${CLOUDINARY_NAME}
  api:
    secret: ${CLOUDINARY_SECRET}
    key: ${CLOUDINARY_KEY}

# ── Stripe ────────────────────────────────────────────────────────────────────
stripe:
  api:
    secretKey: ${STRIPE_SECRET_KEY}
    publicKey: ${STRIPE_PUBLIC_KEY}

# ── PayPal ────────────────────────────────────────────────────────────────────
paypal:
  mode: ${PAYPAL_MODE:sandbox}
  client:
    id: ${PAYPAL_CLIENT_ID}
    secret: ${PAYPAL_CLIENT_SECRET}

success:
  url: ${PAYPAL_SUCCESS_URL:http://localhost:8080/api/v1/paypal/pay/success}
cancel:
  url: ${PAYPAL_CANCEL_URL:http://localhost:8080/api/v1/paypal/pay/cancel}

# ── OAuth2 ────────────────────────────────────────────────────────────────────
oauth2:
  redirect:
    uri: ${OAUTH2_REDIRECT_URI:http://localhost:8080/login/oauth2/code/*}

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    filter: true
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    deep-linking: true
    display-request-duration: true
    default-models-expand-depth: 1
    default-model-rendering: example
    show-extensions: true
    display-operation-id: false
    persist-authorization: true
    try-it-out-enabled: true



#  Artezan Platform (Microservices)
#  ↓
#  ┌─────────────────────────────────────────────┐
#  │                                             │
#  │  artezan-core (Servlet)                     │
#  │  - User management                          │
#  │  - Bookings                                 │
#  │  - Payments                                 │
#  │  - Compliance/Audit                         │
#  │  - Spring MVC + JPA                         │
#  │                                             │
#  ├─────────────────────────────────────────────┤
#  │                                             │
#  │  artezan-notifications (Reactive)           │
#  │  - Real-time notifications                  │
#  │  - WebSocket connections                    │
#  │  - Server-Sent Events                       │
#  │  - Spring WebFlux + Netty                   │
#  │                                             │
#  ├─────────────────────────────────────────────┤
#  │                                             │
#  │  artezan-search (Reactive)                  │
#  │  - High-volume search queries               │
#  │  - Real-time filtering                      │
#  │  - Spring WebFlux                           │
#  │                                             │
#  └─────────────────────────────────────────────┘

#  artezan-core (Servlet — current app)
#- Customer/ServiceProvider management  ✅ Servlet
#- Bookings and payments                ✅ Servlet
#- Listings                             ✅ Servlet
#- Admin operations                     ✅ Servlet
#- Compliance and audit                 ✅ Servlet
#
#  artezan-realtime (Reactive — future service if needed)
#- Real-time booking notifications      ✅ Reactive
#- Live task updates                    ✅ Reactive
#- Chat between customer/provider       ✅ Reactive