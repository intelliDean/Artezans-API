spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    enabled: true
    baseline-version: 0
    baseline-description: "db_init"
    # Flyway inherits spring.datasource credentials automatically
  output:
    ansi:
      enabled: always

# ── JWT / Security ────────────────────────────────────────────────────────────
artezans:
  security:
    jwt:
      secret: ${JWT_SECRET}

# ── Token expiry (hours) ──────────────────────────────────────────────────────
access_expiration: ${ACCESS_EXPIRATION}
refresh_expiration: ${REFRESH_EXPIRATION}

# ── Application meta ──────────────────────────────────────────────────────────
app:
  name: ${APP_NAME}
  email: ${APP_EMAIL}

frontend_url: ${FRONTEND_URL}
charges: ${CHARGES}

# ── Brevo (email + SMS) ───────────────────────────────────────────────────────
sendinblue:
  mail:
    api_key: ${BREVO_API_KEY}
    url: ${MAIL_URL}
  sms:
    url: ${SMS_URL}

# ── Cloudinary ────────────────────────────────────────────────────────────────
cloudinary:
  cloud:
    name: ${CLOUDINARY_NAME}
  api:
    secret: ${CLOUDINARY_SECRET}
    key: ${CLOUDINARY_KEY}

# ── Stripe ────────────────────────────────────────────────────────────────────
stripe:
  api:
    secretKey: ${STRIPE_SECRET_KEY}
    publicKey: ${STRIPE_PUBLIC_KEY}

# ── PayPal ────────────────────────────────────────────────────────────────────
paypal:
  mode: ${PAYPAL_MODE}
  client:
    id: ${PAYPAL_CLIENT_ID}
    secret: ${PAYPAL_CLIENT_SECRET}

success:
  url: ${PAYPAL_SUCCESS_URL}
cancel:
  url: ${PAYPAL_CANCEL_URL}

# ── OAuth2 ────────────────────────────────────────────────────────────────────
oauth2:
  redirect:
    uri: ${OAUTH2_REDIRECT_URI}

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    filter: true
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    deep-linking: true
    display-request-duration: true
    default-models-expand-depth: 1
    default-model-rendering: example
    show-extensions: true
    display-operation-id: false
    persist-authorization: true
    try-it-out-enabled: true